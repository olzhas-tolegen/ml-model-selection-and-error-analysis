name: ml-model-evaluation
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip

  # Core libraries stack
  - numpy>=1.26
  - pandas>=2.2
  - scipy>=1.12
  - joblib>=1.3

  # Machine learning
  - scikit-learn>=1.4

  # Plotting and visualization
  - matplotlib>=3.8
  - seaborn>=0.13

  # Notebook execution and development
  - jupyterlab>=4.0
  - notebook>=7.0
  - ipykernel>=6.29
  - nbformat>=5.9
  - nbclient>=0.10
  - ipywidgets>=8.1

  # Progress bars / convenience
  - tqdm>=4.66

  # PyTorch is installed with pip to match requirements.txt package naming.
  # For CUDA-specific installs, replace this pip line with the official PyTorch command.
  - pip:
      - torch>=2.3
